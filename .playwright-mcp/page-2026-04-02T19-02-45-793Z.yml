          - generic [ref=e410]: ¿Cuál es la diferencia entre vía oral e intravenosa?
          - generic [ref=e411]: +
        - paragraph [ref=e412]: La diferencia es significativa. La vía intravenosa asegura absorción del 100% de los nutrientes directamente al torrente sanguíneo, resultando en efectos más rápidos y niveles terapéuticos mucho más altos. La vía oral depende de la digestión y puede tener una absorción de solo 10-30%, especialmente en personas con problemas intestinales. Para objetivos terapéuticos serios, la vía IV es incomparablemente más efectiva.
      - generic [ref=e413]:
        - button "¿Se necesitan estudios previos? +" [ref=e414] [cursor=pointer]:
          - generic [ref=e415]: ¿Se necesitan estudios previos?
          - generic [ref=e416]: +
        - paragraph [ref=e417]: Sí, absolutamente. Realizamos una evaluación clínica completa y solicitamos estudios de laboratorio específicos antes de iniciar cualquier protocolo de terapia intravenosa. Esto nos permite personalizar completamente el tratamiento a tus necesidades únicas, identificar deficiencias específicas y garantizar la máxima seguridad y efectividad. No trabajamos con protocolos genéricos; cada plan es diseñado científicamente para ti.
      - generic [ref=e418]:
        - button "¿Cuándo notaré los beneficios? +" [ref=e419] [cursor=pointer]:
          - generic [ref=e420]: ¿Cuándo notaré los beneficios?
          - generic [ref=e421]: +
        - paragraph [ref=e422]: El tiempo de respuesta varía según la terapia y tu estado inicial. Muchos pacientes experimentan mejoras notables de energía y claridad mental desde la primera sesión, especialmente con terapias como Myers' Cocktail, NAD+ o Rehydration. Beneficios más profundos como optimización inmunológica, reparación celular y mejoras metabólicas se perciben gradualmente a lo largo de varias sesiones. El monitoreo continuo nos permite ajustar el protocolo para resultados óptimos.
      - generic [ref=e423]:
        - button "¿Se puede combinar con tratamientos médicos actuales? +" [ref=e424] [cursor=pointer]:
          - generic [ref=e425]: ¿Se puede combinar con tratamientos médicos actuales?
          - generic [ref=e426]: +
        - paragraph [ref=e427]: Sí, la terapia intravenosa es altamente complementaria con la medicina convencional. De hecho, puede potenciar muchos tratamientos tradicionales y acelerar la recuperación. Trabajamos en coordinación con tu equipo médico actual para asegurar un enfoque integrado y seguro. Es importante informarnos sobre todos tus medicamentos actuales durante la evaluación inicial para optimizar la sinergia terapéutica.
      - generic [ref=e428]:
        - button "¿Hay contraindicaciones? +" [ref=e429] [cursor=pointer]:
          - generic [ref=e430]: ¿Hay contraindicaciones?
          - generic [ref=e431]: +
        - paragraph [ref=e432]: Las contraindicaciones dependen de cada terapia específica. Personas con insuficiencia renal, hepática o cardiaca severa pueden requerir protocolos especiales o ajustes de dosis. Ciertas terapias no se recomiendan durante el embarazo o lactancia. Por esto es esencial la valoración médica inicial completa, donde evaluamos tu historial clínico detallado, medicaciones actuales y resultados de laboratorio para determinar el protocolo más seguro y efectivo para ti.
